<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>听着一条静静的小河</title>
    <!-- 引入优雅且带一点圆润感的英文字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        /* 动态 CSS 变量（由 JS 随时间动态赋值，实现扁平多彩 UI 过渡） */
        :root {
            --ui-bg: rgba(255, 255, 255, 0.85);
            --ui-text: #1e3a8a;
            --ui-accent: #0ea5e9;
            --ui-track: rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background-color: #1a2035; 
            /* 字体栈：优先西文圆润体，中文自动降级到系统自带的圆幼/黑体 */
            font-family: 'Nunito', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* 全局统一扁平优雅风格类 */
        .cute-panel {
            background: var(--ui-bg); color: var(--ui-text);
            border-radius: 24px; transition: background 0.8s ease, color 0.8s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        /* 隐藏的 SVG 滤镜定义区 */
        #svg-filters { position: absolute; width: 0; height: 0; pointer-events: none; }

        /* UI 控制面板 */
        #ui-panel {
            position: absolute; bottom: 30px; right: 30px;
            padding: 22px; display: flex; flex-direction: column; gap: 18px;
            z-index: 10;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; opacity: 0.8; }
        
        /* 扁平化圆润滑块 */
        .control-group input[type="range"] { -webkit-appearance: none; width: 220px; background: transparent; height: 16px; outline: none; }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: var(--ui-accent); cursor: pointer; margin-top: -7px;
            transition: transform 0.2s, background 0.8s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .control-group input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .control-group input[type="range"]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer; background: var(--ui-track); border-radius: 10px; transition: background 0.8s ease;
        }

        .btn-group { display: flex; gap: 10px; }
        button.action-btn {
            flex: 1; background: var(--ui-track); color: var(--ui-text);
            border: none; padding: 12px 14px; border-radius: 16px;
            font-weight: 800; font-size: 13px; cursor: pointer; letter-spacing: 0.5px;
            transition: all 0.2s ease, background 0.8s ease, color 0.8s ease; font-family: inherit;
        }
        button.action-btn:hover { background: var(--ui-accent); color: #fff; transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        button.action-btn:active { transform: translateY(1px) scale(0.96); }

        /* 左侧精准数据看板 */
        #stats {
            position: absolute; left: 30px; bottom: 30px;
            padding: 16px 20px; display: flex; flex-direction: column; gap: 10px;
            font-size: 13px; font-weight: 800; pointer-events: none; z-index: 10;
        }
        .stat-item { display: flex; align-items: center; justify-content: space-between; gap: 20px; opacity: 0.9;}
        .stat-val { font-weight: 900; color: var(--ui-accent); transition: color 0.8s ease; font-size: 14px;}

        /* 顶部音频控制 */
        #top-ui {
            position: absolute; top: 30px; left: 30px;
            display: flex; gap: 12px; z-index: 10; pointer-events: none;
        }
        .top-btn {
            width: 45px; height: 45px; pointer-events: auto;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.2s; border-radius: 50%;
        }
        .top-btn:active { transform: scale(0.9); }
        .top-btn svg { width: 22px; height: 22px; fill: var(--ui-accent); transition: fill 0.8s ease;}

        /* 右上角时间轮盘 */
        #time-dial-wrapper {
            position: absolute; top: 30px; right: 30px;
            width: 80px; height: 80px; border-radius: 50%;
            cursor: pointer; z-index: 10; display: flex; justify-content: center; align-items: center;
        }
        #time-dial-knob {
            position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 12px; background: var(--ui-accent); border-radius: 50%;
            pointer-events: none; transition: background 0.8s ease;
        }
        #time-dial-text { font-size: 13px; font-weight: 900; pointer-events: none; letter-spacing: 1px;}

        /* 情绪弹窗 */
        #toast {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%) translateY(-20px);
            padding: 15px 30px; font-size: 14px; font-weight: 800; border-radius: 30px;
            opacity: 0; pointer-events: none; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20; text-align: center; white-space: nowrap; letter-spacing: 1px;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ================= 震撼水波封面特效 ================= */
        #play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(240, 248, 255, 0.95); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: background 0.5s ease;
        }
        
        #overlay-content {
            display: flex; flex-direction: column; align-items: center;
            /* 关键点：调用下方定义的 SVG 流体波浪滤镜 */
            filter: url(#water-wave); -webkit-filter: url(#water-wave);
            color: #0ea5e9; text-align: center;
        }

        #overlay-content h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 15px; letter-spacing: 4px; }
        #overlay-content p { font-size: 1.2rem; font-weight: 700; opacity: 0.7; letter-spacing: 2px; }

        /* ======= 手机端极致排版 (完全解决重叠与定位问题) ======= */
        @media (max-width: 768px) {
            #ui-panel { bottom: 20px; right: 15px; left: 15px; padding: 18px; gap: 15px; border-radius: 20px;}
            .control-group label { font-size: 10px; margin-bottom: -2px;}
            .control-group input[type="range"] { width: 100%; height: 12px; }
            .control-group input[type="range"]::-webkit-slider-thumb { height: 16px; width: 16px; margin-top: -5px; }
            .btn-group { gap: 10px; }
            button.action-btn { padding: 10px; font-size: 12px; border-radius: 14px; }
            
            #top-ui { top: 20px; left: 15px; }
            .top-btn { width: 38px; height: 38px; }
            .top-btn svg { width: 18px; height: 18px; }
            
            /* 数据面板移至左上角 (音量按钮下方)，采用单列竖排，并去掉背景 */
            #stats { 
                top: 75px; bottom: auto; left: 15px; right: auto;
                flex-direction: column; 
                padding: 0; gap: 8px; border-radius: 0;
                background: transparent !important; 
                box-shadow: none !important; 
                backdrop-filter: none !important; 
                -webkit-backdrop-filter: none !important;
                /* 增加轻微的文字白底发光，确保在失去背景后文字不会和水流糊在一起 */
                text-shadow: 0 1px 3px rgba(255,255,255,0.8);
            }
            .stat-item { width: auto; font-size: 12px; gap: 10px; justify-content: flex-start; padding-right: 0;}
            .stat-item:nth-child(even) { padding-left: 0; }
            .stat-val { font-size: 13px;}
            
            #time-dial-wrapper { top: 20px; right: 15px; width: 60px; height: 60px; }
            #time-dial-text { font-size: 11px; margin-top: 3px;}
            #time-dial-knob { width: 10px; height: 10px; top: 4px; }
            
            #toast { font-size: 12px; padding: 12px 20px; top: 120px; width: 85%; white-space: normal;}
            
            #overlay-content h1 { font-size: 2.5rem; }
            #overlay-content p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- 容纳流体形变滤镜 -->
    <svg id="svg-filters">
        <filter id="water-wave" x="-20%" y="-20%" width="140%" height="140%">
            <!-- baseFrequency 制造水波纹理，使用 animate 让波浪持续自然涌动 -->
            <feTurbulence type="fractalNoise" baseFrequency="0.015 0.05" numOctaves="2" result="noise">
                <animate attributeName="baseFrequency" values="0.015 0.05; 0.02 0.07; 0.015 0.05" dur="5s" repeatCount="indefinite" />
            </feTurbulence>
            <!-- displacement map 进行画面畸变扭曲，待机时起初轻微波动 (scale=5) -->
            <feDisplacementMap id="liquid-disp" in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </svg>

    <!-- 封面遮罩 -->
    <div id="play-overlay">
        <div id="overlay-content">
            <h1>随物宛流</h1>
            <p>点击屏幕 ✧ 唤醒流水</p>
        </div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgm" loop><source src="1.mp3" type="audio/mpeg"></audio>

    <div id="top-ui">
        <div class="cute-panel top-btn" id="audio-control" onclick="toggleAudio()">
            <svg id="icon-vol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <svg id="icon-mute" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </div>
    </div>

    <div id="time-dial-wrapper" class="cute-panel" title="拨动时间">
        <div id="time-dial-knob"></div>
        <div id="time-dial-text">08:00</div>
    </div>

    <div id="toast" class="cute-panel">水流卷走了一切，内心重归宁静 ✧</div>

    <!-- 精巧排版的数据面板 -->
    <div id="stats" class="cute-panel">
        <div class="stat-item"><span>岸边距离</span> <span class="stat-val" id="stat-width">35.0 m</span></div>
        <div class="stat-item"><span>叮咚水深</span> <span class="stat-val" id="stat-water">3.0 m</span></div>
        <div class="stat-item"><span>奔流速度</span> <span class="stat-val" id="stat-flow">120.5 m³/s</span></div>
        <div class="stat-item"><span>沉底石子</span> <span class="stat-val" id="stat-stones">0</span></div>
    </div>

    <div id="ui-panel" class="cute-panel">
        <div class="control-group">
            <label>RIVER WIDTH 宽度</label>
            <input type="range" id="widthSlider" min="0.3" max="0.85" step="0.01" value="0.7">
        </div>
        <div class="control-group">
            <label>WATER DEPTH 水位</label>
            <input type="range" id="waterSlider" min="0.1" max="1" step="0.01" value="0.6">
        </div>
        <div class="btn-group">
            <button class="action-btn" id="btn-stone">✦ 丢入石子</button>
            <button class="action-btn" id="btn-clear">༄ 释放所有</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

<script>
    /** --- 核心画布与基本物理量 --- */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    let riverWidthRatio = 0.7;
    let waterLevel = 0.6;
    let turbulence = 0.5;
    let minMarginRecord = 0;

    let stones =[]; let clouds =[]; let ripples =[]; let stars = []; let drops =[];
    let underWaterPatches =[]; let decorations =[]; let noisePattern = null;

    let timeOfDay = 8;
    let timeSpeed = 0.0015;
    let isDraggingTime = false;
    let globalFrames = 0;
    
    let curWeatherOp = 0; let weatherTimer = 0; let targetWeatherOp = 0;

    const stoneColors =['#FDE68A', '#FECACA', '#A7F3D0', '#BFDBFE', '#E9D5FF', '#FFFFFF', '#FBCFE8'];
    const umbrellaColors =['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'];

    function createSandTexture() {
        let nCanvas = document.createElement('canvas');
        nCanvas.width = 150; nCanvas.height = 150;
        let nCtx = nCanvas.getContext('2d');
        for(let x=0; x<150; x+=2) {
            for(let y=0; y<150; y+=2) {
                nCtx.fillStyle = Math.random() > 0.5 ? `rgba(0,0,0,${Math.random()*0.02})` : `rgba(255,255,255,${Math.random()*0.02})`;
                nCtx.fillRect(x,y,2,2);
            }
        }
        noisePattern = ctx.createPattern(nCanvas, 'repeat');
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        minMarginRecord = height; 
        createSandTexture(); initStaticEnvironment();
    }
    window.addEventListener('resize', resize);

    /** --- 扁平多彩的时间色彩引擎 --- */
    const colorStops =[
        { t: 0,  c: { sand:[18, 16, 40], waterBase:[0, 191, 255], waterDeep:[25, 25, 112], cloud:[60, 50, 90], 
                      uiBg:[20, 25, 45], uiText:[180, 200, 240], uiAccent:[99, 102, 241], uiTrack:[40, 45, 80] } },
        { t: 5,  c: { sand:[230, 200, 240], waterBase:[255, 182, 193], waterDeep:[138, 43, 226], cloud:[255, 200, 255],
                      uiBg:[250, 240, 255], uiText:[120, 50, 130], uiAccent:[217, 70, 239], uiTrack:[235, 215, 245] } },
        { t: 7,  c: { sand:[255, 248, 220], waterBase:[0, 255, 255], waterDeep:[0, 119, 190], cloud:[255, 250, 250],
                      uiBg:[255, 255, 255], uiText:[15, 110, 110], uiAccent:[2, 132, 199], uiTrack:[224, 242, 254] } },
        { t: 12, c: { sand:[255, 250, 240], waterBase:[64, 224, 208], waterDeep:[0, 191, 255], cloud:[255, 255, 255],
                      uiBg:[255, 255, 255], uiText:[51, 65, 85], uiAccent:[14, 165, 233], uiTrack:[235, 240, 245] } },
        { t: 16, c: { sand:[255, 235, 205], waterBase:[135, 206, 235], waterDeep:[30, 144, 255], cloud:[255, 250, 245],
                      uiBg:[255, 250, 245], uiText:[130, 50, 20], uiAccent:[249, 115, 22], uiTrack:[255, 230, 200] } },
        { t: 18.5, c:{ sand:[255, 218, 185], waterBase:[255, 127, 80], waterDeep:[255, 20, 147], cloud:[255, 180, 200],
                       uiBg:[255, 240, 242], uiText:[160, 20, 60], uiAccent:[244, 63, 94], uiTrack:[250, 220, 220] } },
        { t: 20, c: { sand:[75, 0, 130], waterBase:[147, 112, 219], waterDeep:[72, 61, 139], cloud:[100, 80, 150],
                      uiBg:[45, 15, 95], uiText:[230, 210, 255], uiAccent:[192, 132, 252], uiTrack:[75, 30, 140] } },
        { t: 24, c: { sand:[18, 16, 40], waterBase:[0, 191, 255], waterDeep:[25, 25, 112], cloud:[60, 50, 90],
                      uiBg:[20, 25, 45], uiText:[180, 200, 240], uiAccent:[99, 102, 241], uiTrack:[40, 45, 80] } }
    ];

    function lerpColor(c1, c2, ratio) {
        return[ c1[0] + (c2[0] - c1[0]) * ratio, c1[1] + (c2[1] - c1[1]) * ratio, c1[2] + (c2[2] - c1[2]) * ratio ];
    }

    function getEnvColors() {
        let s1, s2;
        for (let i = 0; i < colorStops.length - 1; i++) {
            if (timeOfDay >= colorStops[i].t && timeOfDay <= colorStops[i+1].t) { s1 = colorStops[i]; s2 = colorStops[i+1]; break; }
        }
        let ratio = (timeOfDay - s1.t) / (s2.t - s1.t); ratio = ratio * ratio * (3 - 2 * ratio); 
        return {
            sand: lerpColor(s1.c.sand, s2.c.sand, ratio),
            waterBase: lerpColor(s1.c.waterBase, s2.c.waterBase, ratio),
            waterDeep: lerpColor(s1.c.waterDeep, s2.c.waterDeep, ratio),
            cloud: lerpColor(s1.c.cloud, s2.c.cloud, ratio),
            uiBg: lerpColor(s1.c.uiBg, s2.c.uiBg, ratio),
            uiText: lerpColor(s1.c.uiText, s2.c.uiText, ratio),
            uiAccent: lerpColor(s1.c.uiAccent, s2.c.uiAccent, ratio),
            uiTrack: lerpColor(s1.c.uiTrack, s2.c.uiTrack, ratio)
        };
    }

    function rgbToStr(arr, alpha=1) { return `rgba(${arr[0]}, ${arr[1]}, ${arr[2]}, ${alpha})`; }

    function updateDynamicUI(env) {
        document.documentElement.style.setProperty('--ui-bg', rgbToStr(env.uiBg, 0.85));
        document.documentElement.style.setProperty('--ui-text', rgbToStr(env.uiText, 1));
        document.documentElement.style.setProperty('--ui-accent', rgbToStr(env.uiAccent, 1));
        document.documentElement.style.setProperty('--ui-track', rgbToStr(env.uiTrack, 1));
    }

    function getShadowVector() {
        let angle = Math.PI + ((timeOfDay - 6) / 24) * Math.PI * 2;
        let length = 80 * Math.abs(Math.cos(angle)) + 5; 
        return { dx: Math.cos(angle) * length, dy: Math.sin(angle) * length * 0.4 };
    }

    function getShadowColor() {
        if (timeOfDay > 6 && timeOfDay < 17) return 'rgba(15, 30, 60, 0.08)';
        if (timeOfDay >= 17 && timeOfDay <= 19) return 'rgba(80, 20, 40, 0.1)';
        return 'rgba(5, 10, 20, 0.2)';
    }

    /** --- 核心实体库与数学绘图 --- */
    class Stone {
        constructor() {
            let edge = Math.floor(Math.random() * 4);
            if (edge === 0) { this.sx = Math.random()*width; this.sy = -100; } 
            else if (edge === 1) { this.sx = Math.random()*width; this.sy = height+100; } 
            else if (edge === 2) { this.sx = -100; this.sy = Math.random()*height; } 
            else { this.sx = width+100; this.sy = Math.random()*height; } 

            let margin = (1 - riverWidthRatio) * (height / 2);
            this.tx = width * 0.1 + Math.random() * (width * 0.8);
            this.ty = margin + 30 + Math.random() * (height - margin*2 - 60);

            this.size = Math.random() * 6 + 6;
            this.color = stoneColors[Math.floor(Math.random() * stoneColors.length)];
            
            this.progress = 0; this.state = 'flying'; this.z = 0; this.wobbleTime = 0;
            this.rotation = Math.random() * Math.PI; this.hasSplashed = false;
        }

        update() {
            if (this.state === 'flying') {
                this.progress += 0.025; 
                if (this.progress >= 1) { this.progress = 1; this.state = 'wobbling'; }
                this.z = 4 * 200 * this.progress * (1 - this.progress); 
            } else if (this.state === 'wobbling') {
                if (!this.hasSplashed) { createSplash(this.tx, this.ty, this.size, 1); this.hasSplashed = true; }
                this.wobbleTime += 0.15;
                if (this.wobbleTime > Math.PI * 4) this.state = 'settled';
            }
        }

        draw(ctx, shadowVec, shadowColor, waterDepth) {
            let curX = this.state === 'flying' ? this.sx + (this.tx - this.sx) * this.progress : this.tx;
            let curY = this.state === 'flying' ? this.sy + (this.ty - this.sy) * this.progress : this.ty;
            let scaleX = 1, scaleY = 1;

            if (this.state === 'wobbling') {
                let damp = Math.exp(-this.wobbleTime * 0.4);
                scaleX = 1 + Math.sin(this.wobbleTime * 2) * 0.3 * damp;
                scaleY = 1 - Math.sin(this.wobbleTime * 2) * 0.3 * damp;
            }

            let finalAlpha = this.state === 'settled' ? 1 - (waterDepth * 0.65) : 1;

            ctx.save(); ctx.translate(curX, curY);
            
            if (this.state === 'flying') {
                ctx.save(); ctx.translate(-curX + this.tx + shadowVec.dx, -curY + this.ty + shadowVec.dy);
                ctx.fillStyle = shadowColor; let shadowScale = 1 - (this.z / 300);
                if (shadowScale > 0) { ctx.beginPath(); ctx.ellipse(0, 0, this.size*shadowScale, this.size*0.6*shadowScale, 0, 0, Math.PI*2); ctx.fill(); }
                ctx.restore();
            } else {
                ctx.fillStyle = `rgba(0,0,0,${finalAlpha * 0.25})`; ctx.beginPath();
                ctx.ellipse(shadowVec.dx*0.2, shadowVec.dy*0.2, this.size, this.size*0.7, this.rotation, 0, Math.PI*2); ctx.fill();
            }

            ctx.translate(0, -this.z); ctx.rotate(this.rotation); ctx.scale(scaleX, scaleY);
            ctx.fillStyle = this.color; ctx.globalAlpha = finalAlpha;
            ctx.beginPath(); ctx.ellipse(0, 0, this.size, this.size*0.8, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = `rgba(255, 255, 255, ${finalAlpha * 0.8})`;
            ctx.beginPath(); ctx.ellipse(-this.size*0.2, -this.size*0.3, this.size*0.3, this.size*0.15, -0.2, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
    }

    class RainDrop {
        constructor() {
            this.x = Math.random() * width; this.y = -10;
            this.length = Math.random() * 15 + 10; this.speed = Math.random() * 10 + 15;
            this.targetY = Math.random() * height; this.wind = 2; 
        }
        update() {
            this.x += this.wind; this.y += this.speed;
            if (this.y > this.targetY) {
                if (Math.random() < 0.2) createSplash(this.x, this.y, 1, 0.2);
                this.y = -10; this.x = Math.random() * width; this.targetY = Math.random() * height;
            }
        }
        draw(ctx, opacity) {
            ctx.strokeStyle = `rgba(255,255,255,${opacity})`; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x - this.wind, this.y - this.length); ctx.stroke();
        }
    }

    class BeachDecoration {
        constructor(isTop) {
            this.isTop = isTop; this.x = width * 0.1 + Math.random() * width * 0.8;
            let extremeMargin = (1 - 0.85) * (height / 2); 
            this.y = isTop ? extremeMargin * Math.random() : height - extremeMargin * Math.random();
            this.type = Math.random() > 0.4 ? 'umbrella' : 'towel';
            this.scale = Math.random() * 0.3 + 0.8;
            this.color = umbrellaColors[Math.floor(Math.random() * umbrellaColors.length)];
            this.rotation = Math.random() * Math.PI;
        }
        draw(ctx, shadowVec, shadowColor) {
            ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.scale, this.scale); ctx.rotate(this.rotation);
            ctx.save(); ctx.translate(shadowVec.dx, shadowVec.dy); ctx.fillStyle = shadowColor; ctx.beginPath();
            if (this.type === 'umbrella') { ctx.arc(0, 0, 22, 0, Math.PI*2); } else if (this.type === 'towel') { ctx.roundRect(-15, -25, 30, 50, 5); }
            ctx.fill(); ctx.restore();

            if (this.type === 'umbrella') {
                let colors =['#ffffff', this.color];
                for(let i=0; i<8; i++) {
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,22, i*Math.PI/4, (i+1)*Math.PI/4);
                    ctx.fillStyle = colors[i%2]; ctx.fill();
                }
                ctx.fillStyle = '#fefefe'; ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
            } else if (this.type === 'towel') {
                ctx.fillStyle = this.color; ctx.roundRect(-15, -25, 30, 50, 5); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(-15, -20, 30, 5); ctx.fillRect(-15, 15, 30, 5); 
            }
            ctx.restore();
        }
    }

    function createSplash(x, y, size, initialAlpha=1) { ripples.push({ x, y, radius: size, alpha: initialAlpha, speed: 1.5 }); }

    function initStaticEnvironment() {
        stars =[]; clouds =[]; underWaterPatches = []; decorations =[]; drops =[];
        for(let i=0; i<120; i++) stars.push({ x: Math.random(), y: Math.random(), s: Math.random()*1.5+0.5, b: Math.random()*Math.PI*2 });
        for(let i=0; i<5; i++) { clouds.push({ x: Math.random()*width, y: Math.random()*height, scale: Math.random()*0.6+0.4, speed: Math.random()*0.15+0.05, altitude: Math.random() * 30 + 20, parts: Array.from({length: 4 + Math.floor(Math.random()*4)}, () => ({ ox: (Math.random()-0.5)*100, oy: (Math.random()-0.5)*50, r: 20 + Math.random()*50 })) }); }
        for(let i=0; i<15; i++) underWaterPatches.push({ x: Math.random()*width, y: Math.random()*height, r: Math.random()*80 + 50, op: Math.random()*0.2 + 0.1 });
        for(let i=0; i<8; i++) decorations.push(new BeachDecoration(i%2===0));
        for(let i=0; i<150; i++) drops.push(new RainDrop());
    }

    /** --- 事件与控制器 --- */
    function updateLogic() {
        riverWidthRatio = parseFloat(document.getElementById('widthSlider').value);
        waterLevel = parseFloat(document.getElementById('waterSlider').value);
        turbulence = (1 - riverWidthRatio) * 0.5 + (1.1 - waterLevel) * 0.5; 

        document.getElementById('stat-width').innerText = `${(riverWidthRatio * 50).toFixed(1)} m`;
        document.getElementById('stat-water').innerText = `${(waterLevel * 5).toFixed(1)} m`;
        document.getElementById('stat-flow').innerText = `${(riverWidthRatio * waterLevel * (1 + turbulence) * 150).toFixed(1)} m³/s`;
        document.getElementById('stat-stones').innerText = stones.filter(s=>s.state==='settled').length;

        let curMargin = (1 - riverWidthRatio) * (height / 2);
        if (curMargin < minMarginRecord) minMarginRecord = curMargin; 
    }

    document.getElementById('widthSlider').addEventListener('input', updateLogic);
    document.getElementById('waterSlider').addEventListener('input', updateLogic);
    document.getElementById('btn-stone').addEventListener('click', () => { stones.push(new Stone()); updateLogic(); });

    let toastTimeout;
    document.getElementById('btn-clear').addEventListener('click', () => {
        stones.forEach(s => { if(s.state === 'settled') createSplash(s.tx, s.ty, s.size * 2); });
        stones =[]; updateLogic();
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), 3500);
    });

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        let cx = e.clientX || (e.touches && e.touches[0].clientX); let cy = e.clientY || (e.touches && e.touches[0].clientY);
        for (let i = stones.length - 1; i >= 0; i--) {
            let s = stones[i];
            if (s.state === 'settled') {
                let dx = cx - rect.left - s.tx; let dy = cy - rect.top - s.ty;
                if (Math.sqrt(dx*dx + dy*dy) < s.size * 2.5) { 
                    stones.splice(i, 1); createSplash(s.tx, s.ty, s.size); updateLogic(); break;
                }
            }
        }
    });

    // 拖拽时间系统
    const dialWrapper = document.getElementById('time-dial-wrapper');
    const dialKnob = document.getElementById('time-dial-knob');
    const dialText = document.getElementById('time-dial-text');

    function updateTimeFromEvent(e) {
        let rect = dialWrapper.getBoundingClientRect();
        let cx = rect.left + rect.width / 2; let cy = rect.top + rect.height / 2;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let angle = Math.atan2(clientY - cy, clientX - cx);
        let deg = angle * (180 / Math.PI) + 90; if (deg < 0) deg += 360;
        timeOfDay = (deg / 360) * 24;
    }

    function updateDialVisual() {
        let deg = (timeOfDay / 24) * 360; let radius = dialWrapper.offsetWidth / 2 - 12; 
        let rad = (deg - 90) * (Math.PI / 180); 
        let kx = Math.cos(rad) * radius + dialWrapper.offsetWidth / 2;
        let ky = Math.sin(rad) * radius + dialWrapper.offsetHeight / 2;
        dialKnob.style.left = `${kx}px`; dialKnob.style.top = `${ky}px`;
        let h = Math.floor(timeOfDay); let m = Math.floor((timeOfDay - h) * 60);
        dialText.innerText = `${(h%12||12).toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    }

    dialWrapper.addEventListener('mousedown', (e) => { isDraggingTime = true; updateTimeFromEvent(e); });
    window.addEventListener('mousemove', (e) => { if(isDraggingTime) updateTimeFromEvent(e); });
    window.addEventListener('mouseup', () => { isDraggingTime = false; });
    dialWrapper.addEventListener('touchstart', (e) => { isDraggingTime = true; updateTimeFromEvent(e); }, {passive:false});
    window.addEventListener('touchmove', (e) => { if(isDraggingTime) { e.preventDefault(); updateTimeFromEvent(e); } }, {passive:false});
    window.addEventListener('touchend', () => { isDraggingTime = false; });

    // 音频安全控制
    const audio = document.getElementById('bgm');
    let isPlaying = false;
    function toggleAudio() {
        if (isPlaying) {
            audio.pause();
            document.getElementById('icon-vol').style.display = 'none';
            document.getElementById('icon-mute').style.display = 'block';
            isPlaying = false;
        } else {
            audio.volume = 0;
            let playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    if (audio.currentTime < 3.0 && audio.readyState >= 2) { audio.currentTime = 3.0; }
                    let vol = 0; 
                    let fade = setInterval(() => { 
                        vol += 0.05; 
                        if(vol >= 0.8) { audio.volume = 0.8; clearInterval(fade); } 
                        else audio.volume = vol; 
                    }, 100);
                    document.getElementById('icon-vol').style.display = 'block';
                    document.getElementById('icon-mute').style.display = 'none';
                    isPlaying = true;
                }).catch(error => { console.log("音频需显式交互:", error); });
            }
        }
    }

    // ============ 震撼级：封面点击水波消散动画 ============
    const playOverlay = document.getElementById('play-overlay');
    const overlayContent = document.getElementById('overlay-content');
    const liquidDisp = document.getElementById('liquid-disp');

    playOverlay.addEventListener('click', function() {
        if (this.dataset.clicked) return; // 防连击
        this.dataset.clicked = "true";
        
        // 音乐必须立刻同步触发，否则会被部分手机浏览器拦截
        toggleAudio(); 
        
        let startTime = performance.now();
        const duration = 1500; // 动画时长 1.5秒，给足水波溶解的时间
        
        function dissolveFrame(time) {
            let elapsed = time - startTime;
            let progress = Math.min(elapsed / duration, 1);
            
            // 水波激荡程度呈指数级狂飙，形成水融化的剧烈拉扯感
            let currentScale = 5 + Math.pow(progress, 3) * 150; 
            if (liquidDisp) liquidDisp.setAttribute('scale', currentScale);
            
            // 文本和背景透明度平滑降低
            overlayContent.style.opacity = 1 - Math.pow(progress, 2);
            playOverlay.style.backgroundColor = `rgba(240, 248, 255, ${0.95 * (1 - progress)})`;
            
            if (progress < 1) {
                requestAnimationFrame(dissolveFrame);
            } else {
                playOverlay.style.display = 'none'; // 动画结束彻底销毁遮罩
            }
        }
        requestAnimationFrame(dissolveFrame);
    });

    /** --- 核心渲染与光影计算 (完全保留) --- */
    function getCurveY(x, margin, isBottom, offset=0) {
        let wave = Math.sin(x * 0.005 + offset) * 15;
        return isBottom ? height - margin + wave : margin + wave;
    }

    function render() {
        ctx.clearRect(0, 0, width, height);
        if (!isDraggingTime) { timeOfDay += timeSpeed; if(timeOfDay >= 24) timeOfDay = 0; }
        globalFrames++; updateDialVisual(); 

        weatherTimer++;
        if(weatherTimer > 3000) { weatherTimer = 0; if(Math.random() < 0.25) targetWeatherOp = Math.random() > 0.5 ? Math.random() * 0.8 : 0; }
        curWeatherOp += (targetWeatherOp - curWeatherOp) * 0.002;

        let env = getEnvColors();
        updateDynamicUI(env); // 驱动UI颜色变化

        let shadowVec = getShadowVector(); let shadowCol = getShadowColor();
        let margin = (1 - riverWidthRatio) * (height / 2);

        if (minMarginRecord < margin) minMarginRecord += 0.35; 

        // 1. 基础沙滩
        ctx.fillStyle = rgbToStr(env.sand); ctx.fillRect(0, 0, width, height);
        if(noisePattern) { ctx.fillStyle = noisePattern; ctx.fillRect(0, 0, width, height); }

        // 2. 湿润沙滩 (退潮痕迹)
        if (minMarginRecord < margin) {
            let wetColor = lerpColor(env.sand, env.waterBase, 0.08); 
            ctx.fillStyle = rgbToStr(wetColor, 0.9);
            
            ctx.beginPath(); ctx.moveTo(0, getCurveY(0, minMarginRecord, false));
            for(let x=0; x<=width; x+=50) ctx.lineTo(x, getCurveY(x, minMarginRecord, false));
            ctx.lineTo(width, getCurveY(width, minMarginRecord, false)); ctx.lineTo(width, getCurveY(width, margin, false));
            for(let x=width; x>=0; x-=50) ctx.lineTo(x, getCurveY(x, margin, false));
            ctx.lineTo(0, getCurveY(0, margin, false)); ctx.fill();
            
            ctx.beginPath(); ctx.moveTo(0, getCurveY(0, minMarginRecord, true));
            for(let x=0; x<=width; x+=50) ctx.lineTo(x, getCurveY(x, minMarginRecord, true));
            ctx.lineTo(width, getCurveY(width, minMarginRecord, true)); ctx.lineTo(width, getCurveY(width, margin, true));
            for(let x=width; x>=0; x-=50) ctx.lineTo(x, getCurveY(x, margin, true));
            ctx.lineTo(0, getCurveY(0, margin, true)); ctx.fill();
        }

        // 3. 河流主体遮罩与填充
        let riverPath = new Path2D();
        riverPath.moveTo(0, getCurveY(0, margin, false));
        for(let x=0; x<=width; x+=50) riverPath.lineTo(x, getCurveY(x, margin, false));
        riverPath.lineTo(width, getCurveY(width, margin, false)); riverPath.lineTo(width, getCurveY(width, margin, true));
        for(let x=width; x>=0; x-=50) riverPath.lineTo(x, getCurveY(x, margin, true));
        riverPath.lineTo(0, getCurveY(0, margin, true)); riverPath.closePath();

        ctx.save(); ctx.clip(riverPath);
        
        underWaterPatches.forEach(p => {
            let grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
            grd.addColorStop(0, `rgba(0, 50, 100, ${p.op})`); grd.addColorStop(1, 'rgba(0, 50, 100, 0)');
            ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        });
        
        let gradient = ctx.createLinearGradient(0, margin, 0, height - margin);
        gradient.addColorStop(0, rgbToStr(env.waterBase, 0.65)); 
        gradient.addColorStop(0.5, rgbToStr(lerpColor(env.waterBase, env.waterDeep, waterLevel), 0.85));
        gradient.addColorStop(1, rgbToStr(env.waterBase, 0.65));
        ctx.fillStyle = gradient; ctx.fill(riverPath);

        let layers =[
            { count: 3+turbulence*8, amp: 20+turbulence*40, speed: 0.02+turbulence*0.06, width: 3+turbulence*3, color: `rgba(0,100,150,${0.1+turbulence*0.2})` },
            { count: 4+turbulence*12, amp: 15+turbulence*30, speed: 0.03+turbulence*0.08, width: 2+turbulence*2, color: `rgba(255,255,255,${0.15+turbulence*0.25})` },
            { count: 2+turbulence*6, amp: 10+turbulence*20, speed: 0.04+turbulence*0.1, width: 1.5, color: `rgba(255,255,255,${0.4+turbulence*0.4})` }
        ];
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        layers.forEach((layer, lIdx) => {
            ctx.strokeStyle = layer.color; ctx.lineWidth = layer.width;
            for (let i = 0; i < layer.count; i++) {
                ctx.beginPath();
                let yBase = margin + (height - margin*2) * ((i + 1) / (layer.count + 1));
                for (let x = -50; x <= width + 50; x += 40) {
                    let toff = globalFrames * layer.speed;
                    let y = yBase + Math.sin(x*0.01+toff+i+lIdx)*layer.amp + Math.cos(x*0.02-toff*0.8+i)*layer.amp*0.5;
                    if (x === -50) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        });
        ctx.restore();

        // 4. 夜空繁星
        if (timeOfDay > 18 || timeOfDay < 6) {
            let op = timeOfDay > 18 ? Math.min(1, (timeOfDay-18)/1.5) : Math.min(1, (6-timeOfDay)/1.5);
            stars.forEach(s => {
                s.b += 0.02; let alpha = ((Math.sin(s.b) + 1)/2) * op;
                ctx.fillStyle = `rgba(255,255,255,${alpha})`; let sx = s.x * width, sy = s.y * height;
                ctx.beginPath(); ctx.arc(sx, sy, s.s, 0, Math.PI*2); ctx.fill();
            });
        }

        decorations.forEach(d => d.draw(ctx, shadowVec, shadowCol));

        stones.forEach(s => s.update());
        stones.filter(s => s.state === 'settled').forEach(s => s.draw(ctx, shadowVec, shadowCol, waterLevel));
        stones.filter(s => s.state !== 'settled').forEach(s => s.draw(ctx, shadowVec, shadowCol, waterLevel));

        for (let i = ripples.length - 1; i >= 0; i--) {
            let r = ripples[i]; r.radius += r.speed; r.alpha -= 0.02;
            ctx.strokeStyle = `rgba(255, 255, 255, ${r.alpha})`; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.ellipse(r.x, r.y, r.radius, r.radius*0.5, 0, 0, Math.PI*2); ctx.stroke();
            if (r.alpha <= 0) ripples.splice(i, 1);
        }

        // 高空云层
        for (let i = clouds.length - 1; i >= 0; i--) {
            let c = clouds[i]; c.x += c.speed;
            ctx.save(); ctx.translate(c.x, c.y); ctx.scale(c.scale, c.scale);
            ctx.fillStyle = shadowCol; ctx.beginPath();
            c.parts.forEach(p => { ctx.moveTo(p.ox + shadowVec.dx*c.altitude, p.oy + shadowVec.dy*c.altitude); ctx.arc(p.ox + shadowVec.dx*c.altitude, p.oy + shadowVec.dy*c.altitude, p.r, 0, Math.PI*2); });
            ctx.fill();
            ctx.fillStyle = rgbToStr(env.cloud, 0.85); ctx.beginPath();
            c.parts.forEach(p => { ctx.moveTo(p.ox, p.oy); ctx.arc(p.ox, p.oy, p.r, 0, Math.PI*2); }); ctx.fill();
            ctx.restore();
            if (c.x > width + 400) clouds.splice(i, 1);
        }
        if (Math.random() < 0.002 && clouds.length < 6) {
            clouds.push({ x: -200, y: Math.random()*height, scale: Math.random()*0.5+0.5, speed: Math.random()*0.15+0.05, altitude: Math.random() * 30 + 20, parts: Array.from({length: 4 + Math.floor(Math.random()*4)}, () => ({ ox: (Math.random()-0.5)*100, oy: (Math.random()-0.5)*50, r: 20 + Math.random()*50 }))});
        }

        // 随机隐秘雨滴
        if(curWeatherOp > 0.01) {
            let dropCount = Math.floor(drops.length * curWeatherOp);
            for(let i=0; i<dropCount; i++) drops[i].draw(ctx, curWeatherOp*0.5), drops[i].update();
            ctx.fillStyle = `rgba(30, 45, 65, ${curWeatherOp * 0.35})`; ctx.fillRect(0,0,width,height);
        }

        requestAnimationFrame(render);
    }

    // 修复：必须第一时间初始化画布尺寸，否则一切物理绘制都会崩溃报错！
    resize();
    updateLogic();
    render();
    
</script>
</body>
</html>
